server.port=${SERVER_PORT:8085}

# Los secretos locales viven en application-local.properties, que no se versiona.
# En servidores se pueden proporcionar directamente mediante variables de entorno.
spring.config.import=optional:classpath:application-local.properties
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/equinoxgym?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.thymeleaf.cache=${THYMELEAF_CACHE:false}

equinox.bootstrap-admin.username=${EQUINOX_ADMIN_USERNAME:admin}
equinox.bootstrap-admin.password=${EQUINOX_ADMIN_PASSWORD:}
