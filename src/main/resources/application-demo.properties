# Perfil de demostracion: base en memoria (H2), sin depender de MySQL ni de wifi.
# Se activa con --spring.profiles.active=demo (ver deploy/demo/ejecutar-demo.bat).
# Cada arranque empieza con la base vacia y se vuelve a sembrar con datos ficticios.
spring.datasource.url=jdbc:h2:mem:demo;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.thymeleaf.cache=false

equinox.bootstrap-admin.username=admin
equinox.bootstrap-admin.password=demo1234

equinox.branding.gym-name=Tu Gimnasio (Demo)
