<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gym System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body class="login-body">

<div class="login-wrapper">
    <div class="login-card">

        <div class="login-brand">
            <img th:src="@{/branding/logo}" th:alt="${'Logo ' + gymName}" class="login-logo">
            <div class="login-brand-text">
                <h1 th:text="${gymName}">GYM SYSTEM</h1>
            </div>
        </div>

        <div class="login-content">
            <div class="login-left">
                <span class="login-badge">Acceso al sistema</span>
                <h2 th:text="${'Bienvenido a ' + gymName}">Bienvenido a Gym System</h2>
                <p>
                    Ingresá con tus credenciales para acceder al panel administrativo del gimnasio
                    y gestionar socios, cuotas y pagos.
                </p>

                <div class="login-image-box">
                    <img th:src="@{/img/logo-login.png}" alt="Gym System" class="login-side-image">
                </div>
            </div>

            <div class="login-right">
                <div class="login-form-box">
                    <h3>Iniciar sesión</h3>
                    <p class="login-form-subtitle">Accedé con tu usuario y contraseña</p>

                    <div th:if="${param.error}" class="premium-alert-danger login-alert">
                        Usuario o contraseña incorrectos.
                    </div>

                    <div th:if="${param.logout}" class="premium-alert-success login-alert">
                        Sesión cerrada correctamente.
                    </div>

                    <form th:action="@{/login}" method="post" class="login-form">
                        <div class="mb-3">
                            <label class="form-label premium-label">Usuario</label>
                            <input type="text" name="username" class="form-control premium-input" placeholder="Ingrese su usuario" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label premium-label">Contraseña</label>
                            <input type="password" name="password" class="form-control premium-input" placeholder="Ingrese su contraseña" required>
                        </div>

                        <button type="submit" class="btn btn-gold-action w-100">Ingresar</button>
                    </form>

                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
