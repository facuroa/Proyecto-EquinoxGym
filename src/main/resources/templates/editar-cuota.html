<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Cuota - Equinox Gym</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Equinox Gym</span>
        <a href="/cuotas" class="btn btn-outline-light btn-sm">Volver</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="card shadow-sm">
        <div class="card-body">
            <h2 class="mb-4">Editar Cuota</h2>

            <form th:action="@{'/cuotas/actualizar/' + ${cuota.id}}" th:object="${cuota}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Socio</label>
                        <select class="form-select" th:field="*{socioId}">
                            <option value="">Seleccione un socio</option>
                            <option th:each="s : ${socios}"
                                    th:value="${s.id}"
                                    th:text="${s.nombreCompleto}">
                            </option>
                        </select>
                        <div class="text-danger mt-1"
                             th:if="${#fields.hasErrors('socioId')}"
                             th:errors="*{socioId}"></div>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Monto</label>
                        <input type="number" step="0.01" min="0" class="form-control"
                               th:field="*{monto}" placeholder="Ingrese el monto">
                        <div class="text-danger mt-1"
                             th:if="${#fields.hasErrors('monto')}"
                             th:errors="*{monto}"></div>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Fecha de vencimiento</label>
                        <input type="date" class="form-control" th:field="*{fechaVencimiento}">
                        <div class="text-danger mt-1"
                             th:if="${#fields.hasErrors('fechaVencimiento')}"
                             th:errors="*{fechaVencimiento}"></div>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Fecha de pago</label>
                        <input type="date" class="form-control" th:field="*{fechaPago}" readonly>
                        <small class="text-muted">La fecha de pago se registra desde el módulo de pagos.</small>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Estado actual</label>
                        <input type="text" class="form-control" th:value="${cuota.estado}" readonly>
                    </div>
                </div>

                <button type="submit" class="btn btn-success">Actualizar cuota</button>
                <a href="/cuotas" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</div>

</body>
</html>
