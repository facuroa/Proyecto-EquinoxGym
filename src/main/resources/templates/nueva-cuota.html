<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Cuota - Equinox Gym</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body class="dashboard-body">
<div class="dashboard-wrapper">

    <aside th:replace="~{fragments/sidebar :: sidebar('cuotas')}"></aside>

    <main class="main-content">

        <header class="topbar">
            <div>
                <p class="topbar-label">Administración de cuotas</p>
                <h1 class="topbar-title">Nueva Cuota</h1>
                <p class="topbar-subtitle">Registrá una nueva cuota mensual para un socio del sistema.</p>
            </div>
            <div class="topbar-status">
                <span>Acción actual</span>
                <strong>Alta</strong>
            </div>
        </header>

        <section class="form-section">
            <div class="premium-form-card">
                <div class="premium-form-header">
                    <h3>Registro de cuota</h3>
                    <span>Completá los datos para generar una nueva cuota</span>
                </div>

                <form th:action="@{/cuotas/guardar}" th:object="${cuota}" method="post" class="premium-form-body">
                    <input type="hidden" th:field="*{id}">

                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label premium-label">Socio</label>
                            <select class="form-select premium-input premium-select" th:field="*{socioId}">
                                <option value="">Seleccione un socio</option>
                                <option th:each="s : ${socios}"
                                        th:value="${s.id}"
                                        th:text="${s.nombreCompleto}">
                                </option>
                            </select>
                            <div class="premium-error" th:if="${#fields.hasErrors('socioId')}" th:errors="*{socioId}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label premium-label">Monto</label>
                            <input type="number" step="0.01" min="0" class="form-control premium-input"
                                   th:field="*{monto}" placeholder="Ingrese el monto">
                            <div class="premium-error" th:if="${#fields.hasErrors('monto')}" th:errors="*{monto}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label premium-label">Fecha de vencimiento</label>
                            <input type="date" class="form-control premium-input" th:field="*{fechaVencimiento}">
                            <div class="premium-error" th:if="${#fields.hasErrors('fechaVencimiento')}" th:errors="*{fechaVencimiento}"></div>
                        </div>
                    </div>

                    <div class="premium-form-actions">
                        <button type="submit" class="btn btn-gold-action">Guardar cuota</button>
                        <a th:href="@{/cuotas}" class="btn btn-outline-gold-soft">Cancelar</a>
                    </div>
                </form>
            </div>
        </section>

    </main>
</div>
</body>
</html>
