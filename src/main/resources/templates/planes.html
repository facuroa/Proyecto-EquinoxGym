<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planes - Gym System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body class="dashboard-body">
<div class="dashboard-wrapper">

    <aside th:replace="~{fragments/sidebar :: sidebar('planes')}"></aside>

    <main class="main-content">

        <header class="topbar">
            <div>
                <p class="topbar-label">Configuración</p>
                <h1 class="topbar-title">Planes</h1>
                <p class="topbar-subtitle">Administrá los planes del gimnasio y sus precios.</p>
            </div>
            <div class="topbar-status">
                <span>Total de planes</span>
                <strong th:text="${#lists.size(planes)}">0</strong>
            </div>
        </header>

        <div th:if="${error}" class="premium-alert-danger mb-4" th:text="${error}"></div>

        <section class="socios-toolbar-section">
            <div class="socios-toolbar-card">
                <div class="d-flex justify-content-end">
                    <a th:href="@{/planes/nuevo}" class="btn btn-gold-action">+ Nuevo plan</a>
                </div>
            </div>
        </section>

        <section class="socios-table-section">
            <div class="premium-table-card">
                <div class="premium-table-header">
                    <div>
                        <h3>Listado de planes</h3>
                        <span>Precios y duraciones disponibles</span>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table premium-table align-middle mb-0">
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Precio</th>
                                <th>Duración</th>
                                <th>Estado</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(planes)}">
                                <td colspan="5" class="text-center py-5 empty-state-cell">No hay planes cargados.</td>
                            </tr>
                            <tr th:each="plan : ${planes}">
                                <td th:text="${plan.nombre}">Mensual</td>
                                <td th:text="${'$ ' + plan.precio}">$ 0</td>
                                <td th:text="${plan.duracionMeses + (plan.duracionMeses == 1 ? ' mes' : ' meses')}">1 mes</td>
                                <td>
                                    <span th:if="${plan.activo}" class="status-badge status-badge-success">Activo</span>
                                    <span th:unless="${plan.activo}" class="status-badge status-badge-danger">Inactivo</span>
                                </td>
                                <td class="text-center">
                                    <div class="action-buttons-premium">
                                        <a th:href="@{'/planes/editar/' + ${plan.id}}" class="btn btn-edit-premium btn-sm">Editar</a>
                                        <a th:href="@{'/planes/eliminar/' + ${plan.id}}"
                                           class="btn btn-delete-premium btn-sm"
                                           data-confirm-delete
                                           th:data-mensaje="${'¿Seguro que querés eliminar el plan ' + plan.nombre + '? Esta acción no se puede deshacer.'}">Eliminar</a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<div th:replace="~{fragments/confirm-delete-modal :: confirmDeleteModal}"></div>
<script th:src="@{/js/confirm-delete.js}"></script>
</body>
</html>
