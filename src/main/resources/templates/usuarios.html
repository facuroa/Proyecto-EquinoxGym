<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios - Gym System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body class="dashboard-body">
<div class="dashboard-wrapper">

    <aside th:replace="~{fragments/sidebar :: sidebar('usuarios')}"></aside>

    <main class="main-content">

        <header class="topbar">
            <div>
                <p class="topbar-label">Configuración</p>
                <h1 class="topbar-title">Usuarios del sistema</h1>
                <p class="topbar-subtitle">Administrá los usuarios y sus roles de acceso.</p>
            </div>
            <div class="topbar-status">
                <span>Total usuarios</span>
                <strong th:text="${#lists.size(usuarios)}">0</strong>
            </div>
        </header>

       <div th:replace="~{fragments/toast :: toast('error', ${error})}"></div>

        <section class="socios-toolbar-section">
            <div class="socios-toolbar-card">
                <div class="d-flex justify-content-end">
                    <a th:href="@{/usuarios/nuevo}" class="btn btn-gold-action">+ Nuevo usuario</a>
                </div>
            </div>
        </section>

        <section class="socios-table-section">
            <div class="premium-table-card">
                <div class="premium-table-header">
                    <div>
                        <h3>Listado de usuarios</h3>
                        <span>Accesos y roles del sistema</span>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table premium-table align-middle mb-0">
                        <thead>
                            <tr>
                                <th>Usuario</th>
                                <th>Rol</th>
                                <th>Estado</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(usuarios)}">
                                <td colspan="4" class="text-center py-5 empty-state-cell">No hay usuarios cargados.</td>
                            </tr>
                            <tr th:each="u : ${usuarios}">
                                <td th:text="${u.username}">admin</td>
                                <td>
                                    <span th:if="${u.rol.name() == 'ADMIN'}" class="status-badge role-admin-badge">Administrador</span>
                                    <span th:unless="${u.rol.name() == 'ADMIN'}" class="status-badge role-recep-badge">Recepcionista</span>
                                </td>
                                <td>
                                    <span th:if="${u.activo}" class="status-badge status-badge-success">Activo</span>
                                    <span th:unless="${u.activo}" class="status-badge status-badge-danger">Inactivo</span>
                                </td>
                                <td class="text-center">
                                    <div class="action-buttons-premium">
                                        <a th:href="@{'/usuarios/editar/' + ${u.id}}" class="btn btn-edit-premium btn-sm">Editar</a>
                                         <a th:href="@{'/usuarios/eliminar/' + ${u.id}}"
                                           class="btn btn-delete-premium btn-sm"
                                           data-confirm-delete
                                           th:data-mensaje="${'¿Seguro que querés eliminar al usuario ' + u.username + '?'}">Eliminar</a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<div th:replace="~{fragments/confirm-delete-modal :: confirmDeleteModal}"></div>
<script th:src="@{/js/confirm-delete.js}"></script>
</body>
</html>
