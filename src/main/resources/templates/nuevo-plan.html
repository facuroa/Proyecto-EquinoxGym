<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan - Gym System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body class="dashboard-body">
<div class="dashboard-wrapper">

    <aside th:replace="~{fragments/sidebar :: sidebar('planes')}"></aside>

    <main class="main-content">

        <header class="topbar">
            <div>
                <p class="topbar-label">Configuración</p>
                <h1 class="topbar-title" th:text="${plan.id != null ? 'Editar Plan' : 'Nuevo Plan'}">Nuevo Plan</h1>
                <p class="topbar-subtitle">Definí el nombre, precio y duración del plan.</p>
            </div>
            <div class="topbar-status">
                <span>Acción</span>
                <strong th:text="${plan.id != null ? 'Edición' : 'Alta'}">Alta</strong>
            </div>
        </header>

        <section class="form-section">
            <div class="premium-form-card">
                <div class="premium-form-header">
                    <h3 th:text="${plan.id != null ? 'Editar plan' : 'Registrar nuevo plan'}">Registrar plan</h3>
                    <span>Completá los campos obligatorios</span>
                </div>

                <div th:if="${error}" class="premium-alert-danger" th:text="${error}"></div>

                <form th:action="@{/planes/guardar}" th:object="${plan}" method="post" class="premium-form-body">
                    <input type="hidden" th:field="*{id}">

                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label premium-label">Nombre del plan</label>
                            <input type="text" class="form-control premium-input" th:field="*{nombre}"
                                   placeholder="Ej: Mensual, Trimestral, Anual" maxlength="80" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label premium-label">Precio ($)</label>
                            <input type="number" step="0.01" min="0.01" class="form-control premium-input"
                                   th:field="*{precio}" placeholder="Ej: 15000" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label premium-label">Duración (meses)</label>
                            <input type="number" min="1" max="60" class="form-control premium-input"
                                   th:field="*{duracionMeses}" placeholder="Ej: 1, 3, 12" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label premium-label">Estado</label>
                            <select class="form-select premium-input premium-select" th:field="*{activo}">
                                <option value="true">Activo</option>
                                <option value="false">Inactivo</option>
                            </select>
                        </div>
                    </div>

                    <div class="premium-form-actions">
                        <button type="submit" class="btn btn-gold-action"
                                th:text="${plan.id != null ? 'Guardar cambios' : 'Guardar plan'}">
                            Guardar plan
                        </button>
                        <a th:href="@{/planes}" class="btn btn-outline-gold-soft">Cancelar</a>
                    </div>
                </form>
            </div>
        </section>

    </main>
</div>
</body>
</html>
