<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Socio - Equinox Gym</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body class="dashboard-body">

<div class="dashboard-wrapper">

    <aside class="sidebar">
        <div>
            <a th:href="@{/dashboard}" class="brand-box">
                <img th:src="@{/img/icono.png}" alt="Logo Equinox" class="brand-logo">
                <div class="brand-texts">
                    <span class="brand-title">EQUINOX</span>
                    <span class="brand-subtitle">GYM SYSTEM</span>
                </div>
            </a>

            <div class="sidebar-user">
                <span class="sidebar-user-label">Formulario</span>
                <strong th:text="${socio.id != null ? 'Editar socio' : 'Nuevo socio'}">Nuevo socio</strong>
            </div>

            <nav class="sidebar-nav">
                <a th:href="@{/dashboard}" class="sidebar-link">Inicio</a>
                <a th:href="@{/socios}" class="sidebar-link active">Socios</a>
                <a th:href="@{/cuotas}" class="sidebar-link">Cuotas</a>
                <a th:href="@{/pagos}" class="sidebar-link">Pagos</a>
            </nav>
        </div>

        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-logout w-100">Cerrar sesión</button>
        </form>
    </aside>

    <main class="main-content">

        <header class="topbar">
            <div>
                <p class="topbar-label">Administración de socios</p>
                <h1 class="topbar-title" th:text="${socio.id != null ? 'Editar Socio' : 'Nuevo Socio'}">Nuevo Socio</h1>
                <p class="topbar-subtitle">
                    Completá la información del socio para registrar o actualizar sus datos.
                </p>
            </div>

            <div class="topbar-status">
                <span>Acción actual</span>
                <strong th:text="${socio.id != null ? 'Edición' : 'Alta'}">Alta</strong>
            </div>
        </header>

        <section class="form-section">
            <div class="premium-form-card">
                <div class="premium-form-header">
                    <h3 th:text="${socio.id != null ? 'Datos del socio' : 'Registro de nuevo socio'}">Registro de nuevo socio</h3>
                    <span>Completá los campos obligatorios</span>
                </div>

                <form th:action="@{/socios/guardar}" th:object="${socio}" method="post" class="premium-form-body">
                    <input type="hidden" th:field="*{id}">

                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label premium-label">Nombre</label>
                            <input type="text" class="form-control premium-input" th:field="*{nombre}" placeholder="Ingrese el nombre">
                            <div class="premium-error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label premium-label">Apellido</label>
                            <input type="text" class="form-control premium-input" th:field="*{apellido}" placeholder="Ingrese el apellido">
                            <div class="premium-error" th:if="${#fields.hasErrors('apellido')}" th:errors="*{apellido}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label premium-label">DNI</label>
                            <input type="text" class="form-control premium-input" th:field="*{dni}" placeholder="Ingrese el DNI">
                            <div class="premium-error" th:if="${#fields.hasErrors('dni')}" th:errors="*{dni}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label premium-label">Teléfono</label>
                            <input type="text" class="form-control premium-input" th:field="*{telefono}" placeholder="Ingrese el teléfono">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label premium-label">Estado</label>
                            <select class="form-select premium-input premium-select" th:field="*{estado}">
                                <option value="">Seleccione un estado</option>
                                <option value="ACTIVO">Activo</option>
                                <option value="INACTIVO">Inactivo</option>
                                <option value="MOROSO">Moroso</option>
                            </select>
                            <div class="premium-error" th:if="${#fields.hasErrors('estado')}" th:errors="*{estado}"></div>
                        </div>
                    </div>

                    <div class="premium-form-actions">
                        <button type="submit" class="btn btn-gold-action"
                                th:text="${socio.id != null ? 'Guardar cambios' : 'Guardar socio'}">
                            Guardar socio
                        </button>
                        <a th:href="@{/socios}" class="btn btn-outline-gold-soft">Cancelar</a>
                    </div>
                </form>
            </div>
        </section>

    </main>
</div>

</body>
</html>
