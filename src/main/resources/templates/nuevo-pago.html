<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Pago - Equinox Gym</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body class="dashboard-body">

<div class="dashboard-wrapper">

    <aside class="sidebar">
        <div>
            <a th:href="@{/dashboard}" class="brand-box">
                <img th:src="@{/img/icono.png}" alt="Logo Equinox" class="brand-logo">
                <div class="brand-texts">
                    <span class="brand-title">EQUINOX</span>
                    <span class="brand-subtitle">GYM SYSTEM</span>
                </div>
            </a>

            <div class="sidebar-user">
                <span class="sidebar-user-label">Formulario</span>
                <strong>Registrar pago</strong>
            </div>

            <nav class="sidebar-nav">
                <a th:href="@{/dashboard}" class="sidebar-link">Inicio</a>
                <a th:href="@{/socios}" class="sidebar-link">Socios</a>
                <a th:href="@{/cuotas}" class="sidebar-link">Cuotas</a>
                <a th:href="@{/pagos}" class="sidebar-link active">Pagos</a>
            </nav>
        </div>

        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-logout w-100">Cerrar sesión</button>
        </form>
    </aside>

    <main class="main-content">

        <header class="topbar">
            <div>
                <p class="topbar-label">Administración de pagos</p>
                <h1 class="topbar-title">Registrar Pago</h1>
                <p class="topbar-subtitle">
                    Asociá el pago a una cuota pendiente y registrá el movimiento.
                </p>
            </div>

            <div class="topbar-status">
                <span>Acción actual</span>
                <strong>Alta</strong>
            </div>
        </header>

        <section class="form-section">
            <div class="premium-form-card">
                <div class="premium-form-header">
                    <h3>Registro de pago</h3>
                    <span>Completá los datos del pago</span>
                </div>

                <div th:if="${error}" class="premium-alert-danger" th:text="${error}"></div>

                <form th:action="@{/pagos/guardar}" th:object="${pago}" method="post" class="premium-form-body">
                    <input type="hidden" th:field="*{id}">

                    <div class="row g-4">
                        <div class="col-12">
                            <label class="form-label premium-label">Cuota</label>
                            <select class="form-select premium-input premium-select" name="cuotaId" required>
                                <option value="">Seleccione una cuota</option>
                                <option th:each="cuota : ${cuotasPendientes}"
                                        th:value="${cuota.id}"
                                        th:text="${cuota.socio != null 
                                            ? cuota.socio.nombreCompleto + ' - $' + cuota.monto + ' - Vence: ' + cuota.fechaVencimiento
                                            : 'Cuota #' + cuota.id}">
                                </option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label premium-label">Monto</label>
                            <input type="number" step="0.01" min="0" class="form-control premium-input"
                                   th:field="*{monto}" placeholder="Ingrese el monto">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label premium-label">Medio de pago</label>
                            <select class="form-select premium-input premium-select" th:field="*{medioPago}">
                                <option value="">Seleccione un medio de pago</option>
                                <option value="Efectivo">Efectivo</option>
                                <option value="Transferencia">Transferencia</option>
                                <option value="Tarjeta">Tarjeta</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label premium-label">Fecha de pago</label>
                            <input type="date" class="form-control premium-input" th:field="*{fechaPago}" readonly>
                            <small class="premium-help-text">La fecha se asigna automáticamente al guardar.</small>
                        </div>
                    </div>

                    <div class="premium-form-actions">
                        <button type="submit" class="btn btn-gold-action">Guardar pago</button>
                        <a th:href="@{/pagos}" class="btn btn-outline-gold-soft">Cancelar</a>
                    </div>
                </form>
            </div>
        </section>

    </main>
</div>

</body>
</html>
