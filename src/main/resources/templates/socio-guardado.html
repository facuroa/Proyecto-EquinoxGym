<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Socio Guardado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-sm">
        <div class="card-body">
            <h1 class="text-success">Socio guardado correctamente</h1>
            <hr>

            <p><strong>Nombre:</strong> <span th:text="${socio.nombre}"></span></p>
            <p><strong>Apellido:</strong> <span th:text="${socio.apellido}"></span></p>
            <p><strong>DNI:</strong> <span th:text="${socio.dni}"></span></p>
            <p><strong>Teléfono:</strong> <span th:text="${socio.telefono}"></span></p>
            <p><strong>Email:</strong> <span th:text="${socio.email}"></span></p>
            <p><strong>Estado:</strong> <span th:text="${socio.estado}"></span></p>

            <a href="/socios" class="btn btn-primary">Volver al listado</a>
            <a href="/socios/nuevo" class="btn btn-success">Cargar otro socio</a>
        </div>
    </div>
</div>

</body>
</html>
